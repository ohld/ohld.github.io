    <script>
      // SPA GitHub Pages decode — paired with public/404.html (rafgraph/spa-github-pages)
      // Restores the real path that the user requested before the 404 redirect.

          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, '',
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
