server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  absolute_redirect off;
  charset utf-8;
  error_page 404 /404-static.html;
  expires 10m;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    expires off;
    return 200 "ok\n";
  }

  location = /404-static.html {
    internal;
    expires 10m;
  }

  location = /ru {
    return 308 /;
  }

  location = /ru/ {
    return 308 /;
  }

  location = /closed {
    return 308 /private-channel/;
  }

  location = /closed/ {
    return 308 /private-channel/;
  }

  location = /work-together {
    return 308 /about/;
  }

  location = /work-together/ {
    return 308 /about/;
  }

  location = /markdown-vs-html {
    return 308 /articles/markdown-vs-html/;
  }

  location = /markdown-vs-html/ {
    return 308 /articles/markdown-vs-html/;
  }

  location = /posts {
    return 308 /blog/;
  }

  location = /posts/ {
    return 308 /blog/;
  }

  location = /ai-agents {
    return 308 /articles/;
  }

  location = /ai-agents/ {
    return 308 /articles/;
  }

  location = /ai-course {
    return 308 /articles/;
  }

  location = /ai-course/ {
    return 308 /articles/;
  }

  location = /blog/ai-tools-for-designers-design-engineering-agents {
    return 308 /articles/ai-tools-for-designers-design-engineering-agents/;
  }

  location = /blog/ai-tools-for-designers-design-engineering-agents/ {
    return 308 /articles/ai-tools-for-designers-design-engineering-agents/;
  }

  location = /author/okhlopkov {
    return 308 /about/;
  }

  location = /author/okhlopkov/ {
    return 308 /about/;
  }

  location = /projects {
    return 308 /about/;
  }

  location = /projects/ {
    return 308 /about/;
  }

  location = /tag/second-brain {
    return 308 /vtoroj-mozg-ai-assistent-obsidian-claude-code/;
  }

  location = /tag/second-brain/ {
    return 308 /vtoroj-mozg-ai-assistent-obsidian-claude-code/;
  }

  location = /tag/ai-agents {
    return 308 /articles/;
  }

  location = /tag/ai-agents/ {
    return 308 /articles/;
  }

  location = /tag/telegram {
    return 308 /blog/;
  }

  location = /tag/telegram/ {
    return 308 /blog/;
  }

  location = /tag/ai {
    return 308 /articles/;
  }

  location = /tag/ai/ {
    return 308 /articles/;
  }

  location = /tag/analytics {
    return 308 /blog/;
  }

  location = /tag/analytics/ {
    return 308 /blog/;
  }

  location = /tag/claude-code {
    return 308 /articles/;
  }

  location = /tag/claude-code/ {
    return 308 /articles/;
  }

  location = /tag/crypto {
    return 308 /blog/;
  }

  location = /tag/crypto/ {
    return 308 /blog/;
  }

  location = /tag/dokku {
    return 308 /cloudflare-certificates-dokku/;
  }

  location = /tag/dokku/ {
    return 308 /cloudflare-certificates-dokku/;
  }

  location = /tag/parsing {
    return 308 /how-to-get-a-telegram-channel-subscribers-list-in-python/;
  }

  location = /tag/parsing/ {
    return 308 /how-to-get-a-telegram-channel-subscribers-list-in-python/;
  }

  location = /tag/telegram-cn {
    return 308 /en/;
  }

  location = /tag/telegram-cn/ {
    return 308 /en/;
  }

  location = /tag/telegram-en {
    return 308 /en/;
  }

  location = /tag/telegram-en/ {
    return 308 /en/;
  }

  location = /tag/web-scraping {
    return 308 /web-scraping-ai-agents-2026/;
  }

  location = /tag/web-scraping/ {
    return 308 /web-scraping-ai-agents-2026/;
  }

  location = /cn {
    return 308 /en/;
  }

  location = /cn/ {
    return 308 /en/;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  location ~* \.(?:xml|txt|md|json)$ {
    expires 10m;
    add_header Cache-Control "public, max-age=600";
    try_files $uri =404;
  }

  location / {
    expires 10m;
    try_files $uri $uri/ =404;
  }
}
